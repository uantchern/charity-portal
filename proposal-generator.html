<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Generator | CharityOps</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 40px;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1280px;
            height: 90vh;
            max-height: 900px;
            min-height: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Setup Pane (Config) */
        .setup-pane {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            width: 450px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(210, 180, 140, 0.3);
            flex-shrink: 0;
            overflow-y: auto;
        }

        .setup-pane::-webkit-scrollbar { width: 6px; }
        .setup-pane::-webkit-scrollbar-thumb { background: rgba(210, 180, 140, 0.5); border-radius: 10px; }

        .setup-pane h1 {
            font-size: 28px;
            color: #1B2B28;
            font-weight: 900;
            margin-bottom: 8px;
            font-family: Georgia, serif;
            line-height: 1.2;
        }

        .tagline {
            color: #8B7355;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #8B7355;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #D2B48C;
            font-size: 14px;
            color: #1B2B28;
            background-color: white;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        textarea.input-field {
            resize: vertical;
        }

        .input-field:focus {
            border-color: #8B7355;
            box-shadow: 0 0 0 4px rgba(210, 180, 140, 0.3);
        }

        .primary-btn {
            background-color: #1B2B28;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(27, 43, 40, 0.2);
            margin-top: auto;
        }

        .primary-btn:hover {
            background-color: #8B7355;
            transform: translateY(-2px);
        }

        /* Right Pane (Document Preview) */
        .preview-pane {
            background-color: rgba(255, 255, 255, 0.5);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            background-color: #1B2B28;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            color: white;
            gap: 12px;
        }

        .preview-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            flex-grow: 1;
            font-family: Georgia, serif;
        }

        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background-image:
                radial-gradient(circle at 100% 0%, rgba(210, 180, 140, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(139, 115, 85, 0.05) 0%, transparent 40%);
        }

        .document-canvas {
            background: #ffffff;
            border: 1px solid #EAE5D8;
            border-radius: 8px;
            padding: 60px 50px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .document-title {
            font-family: Georgia, serif;
            font-size: 32px;
            color: #1B2B28;
            text-align: center;
            border-bottom: 2px solid #D2B48C;
            padding-bottom: 24px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .doc-section {
            margin-bottom: 32px;
        }

        .doc-section h3 {
            font-family: -apple-system, sans-serif;
            color: #8B7355;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            border-bottom: 1px solid #EAE5D8;
            padding-bottom: 6px;
        }

        .doc-section p, .doc-section ul {
            color: #5E5A4B;
            line-height: 1.6;
            font-size: 15px;
        }

        .doc-section ul {
            padding-left: 24px;
            list-style-type: disc;
            margin-top: 8px;
        }

        .doc-section li {
            margin-bottom: 6px;
        }

        .header-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .header-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ProposalGenerator = () => {
            const [copied, setCopied] = useState(false);
            
            const [data, setData] = useState({
                charityName: "Hope Foundation",
                mission: "To empower vulnerable youth through education and mentorship programs.",
                requestedScope: "A comprehensive governance and internal controls review focusing on financial sustainability.",
                proposedScopeDetails: "Review of existing internal controls, sample testing of 30 recent financial transactions, and drafting of a new Finance SOP manual.",
                deliverables: "1. Internal Control Review Report\n2. Finance SOP Manual\n3. High-level Risk Register",
                timelineWeeks: "6",
                feeEstimate: "$15,000"
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setData(prev => ({ ...prev, [name]: value }));
            };

            const copyToClipboard = () => {
                const el = document.getElementById('proposal-document');
                if (!el) return;
                const content = el.innerText;
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(content).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }).catch(err => {
                        console.error('Copy failed', err);
                    });
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (err) {
                        console.error('Fallback copy failed', err);
                    }
                    document.body.removeChild(textarea);
                }
            };

            return (
                <div className="app-container">
                    {/* Setup Pane */}
                    <div className="setup-pane">
                        <div className="font-serif text-3xl leading-none cursor-default select-none group"
                            style={{ fontFamily: 'Georgia, serif', marginBottom: '1.5rem' }}>
                            <span className="relative inline-block" style={{ position: 'relative', display: 'inline-block' }}>
                                <span className="italic relative z-10"
                                    style={{ color: '#103020', fontWeight: 500, paddingRight: '0.25rem', position: 'relative', zIndex: 10, fontStyle: 'italic' }}>Charity</span>
                                <span
                                    style={{ position: 'absolute', left: '-0.2em', right: 0, bottom: '12%', height: '2px', background: '#B08968', zIndex: 0, transformOrigin: 'left', transition: 'transform 0.7s ease-out' }}></span>
                            </span><span className="relative z-10 tracking-tight"
                                style={{ color: '#B08968', position: 'relative', zIndex: 10, fontWeight: 400, letterSpacing: '-0.025em', marginLeft: '-0.05em' }}>Ops</span>
                        </div>
                        
                        <div style={{ marginBottom: '24px' }}>
                            <p className="tagline"><i className="fas fa-bolt"></i> A Really Useful Thing</p>
                            <h1>Proposal Builder</h1>
                            <p style={{ fontSize: '14px', color: '#5E5A4B', lineHeight: 1.6, margin: 0 }}>
                                Need to ship a customized proposal quickly? Fill in the specifics and check the live document builder.
                            </p>
                        </div>

                        <div className="input-group">
                            <label>Charity Name</label>
                            <input type="text" name="charityName" className="input-field" value={data.charityName} onChange={handleChange} />
                        </div>

                        <div className="input-group">
                            <label>Charity Mission Summary</label>
                            <textarea name="mission" className="input-field" value={data.mission} onChange={handleChange} rows="2"></textarea>
                        </div>

                        <div className="input-group">
                            <label>Requested Scope</label>
                            <textarea name="requestedScope" className="input-field" value={data.requestedScope} onChange={handleChange} rows="2"></textarea>
                        </div>

                        <div className="input-group">
                            <label>Detailed Proposed Scope</label>
                            <textarea name="proposedScopeDetails" className="input-field" value={data.proposedScopeDetails} onChange={handleChange} style={{minHeight: '80px'}}></textarea>
                        </div>

                        <div className="input-group">
                            <label>Specific Deliverables</label>
                            <textarea name="deliverables" className="input-field" value={data.deliverables} onChange={handleChange} style={{minHeight: '80px'}}></textarea>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '24px' }}>
                            <div>
                                <label style={{ fontSize: '13px', fontWeight: 700, letterSpacing: '0.05em', color: '#8B7355', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Timeline (Weeks)</label>
                                <input type="number" name="timelineWeeks" className="input-field" value={data.timelineWeeks} onChange={handleChange} />
                            </div>
                            <div>
                                <label style={{ fontSize: '13px', fontWeight: 700, letterSpacing: '0.05em', color: '#8B7355', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Fee Estimate</label>
                                <input type="text" name="feeEstimate" className="input-field" value={data.feeEstimate} onChange={handleChange} />
                            </div>
                        </div>

                        <button className="primary-btn" onClick={copyToClipboard} style={{ marginTop: 'auto' }}>
                            {copied ? <><i className="fas fa-check"></i> Copied to Clipboard</> : <><i className="far fa-copy"></i> Copy Full Proposal</>}
                        </button>
                    </div>

                    {/* Preview Pane */}
                    <div className="preview-pane">
                        <div className="preview-header">
                            <a href="index.html" className="text-white hover:text-[#D2B48C] mr-2" style={{ textDecoration: 'none' }} title="Back to Portal">
                                <i className="fas fa-arrow-left text-xl"></i>
                            </a>
                            <h2>Document Output</h2>
                            
                            <a href="https://notebooklm.google.com/notebook/a64339a3-9e7e-4629-8351-07eeb18bb555" target="_blank" className="header-btn ml-auto">
                                <img src="https://www.gstatic.com/images/branding/product/1x/notebooklm_48dp.png" alt="" style={{ width: 14, height: 14 }}/>
                                SSC Proposals NBLM
                            </a>
                        </div>

                        <div className="preview-content">
                            <div className="document-canvas" id="proposal-document">
                                <h1 className="document-title">
                                    Proposal for {data.charityName || '[Charity Name]'}
                                </h1>

                                <div className="doc-section">
                                    <h3>1. Executive Summary</h3>
                                    <p>Thank you for giving us the opportunity to present this proposal. We are a dedicated service provider with a strong vision and mission to elevate the social ecosystem. Our key differentiators include deep sector experience across charities and IPCs, affordable and transparent pricing, and a fundamental focus on capability-building rather than mere compliance ticking.</p>
                                </div>

                                <div className="doc-section">
                                    <h3>2. Your Requirements & Our Response</h3>
                                    <p>We understand that <strong>{data.charityName || '[Charity Name]'}</strong> is driven by the dynamic mission:<br/><br/><em>"{data.mission || '[Mission Statement]'}"</em></p>
                                    <p style={{marginTop: '1rem'}}>To support this critical work, you have requested: {data.requestedScope || '[Requested Scope]'}. We are fully equipped and committed to addressing these specific requirements with precision and empathy.</p>
                                </div>

                                <div className="doc-section">
                                    <h3>3. Proposed Scope</h3>
                                    <p>Our detailed breakdown of the areas to be reviewed is as follows:</p>
                                    <p style={{marginTop: '0.5rem', marginBottom: '0.5rem'}}>{data.proposedScopeDetails}</p>
                                    <p><em>Sampling Methodology:</em> Unless otherwise specified, we will utilize targeted risk-based sampling combined with random sampling to ensure comprehensive coverage without overwhelming your operational team.</p>
                                </div>

                                <div className="doc-section">
                                    <h3>4. Our Approach</h3>
                                    <p>We utilize a collaborative, step-by-step methodology designed specifically for the charity sector and based on established governance frameworks. Our process includes:</p>
                                    <ul>
                                        <li><strong>Opening Meeting:</strong> Aligning expectations, confirming timelines, and finalizing the document request list.</li>
                                        <li><strong>Fieldwork:</strong> Conducting targeted interviews with key stakeholders and performing necessary control testing.</li>
                                        <li><strong>Closing Meeting:</strong> Discussing draft observations collaboratively to ensure contextual accuracy.</li>
                                        <li><strong>Issuance of Final Report:</strong> Delivering actionable insights and finalized documentation.</li>
                                    </ul>
                                </div>

                                <div className="doc-section">
                                    <h3>5. Deliverables</h3>
                                    <p>Upon completion of the engagement, we will provide the following clearly defined outputs:</p>
                                    <ul>
                                        {data.deliverables ? data.deliverables.split('\n').filter(d => d.trim()).map((del, i) => (
                                            <li key={i}>{del}</li>
                                        )) : <li>[No deliverables specified]</li>}
                                    </ul>
                                </div>

                                <div className="doc-section">
                                    <h3>6. Review Schedule</h3>
                                    <p>We estimate that this engagement will take approximately <strong>{data.timelineWeeks || '[X]'} weeks</strong>. This timeline intelligently allocates specific periods for planning, fieldwork, draft reporting, and finalization to minimize disruption to your operations.</p>
                                </div>

                                <div className="doc-section">
                                    <h3>7. Fees and Funding Options</h3>
                                    <p>Our professional fee for this engagement is estimated at <strong>{data.feeEstimate || '[Fee Amount]'}</strong>.</p>
                                    <p style={{marginTop: '1rem'}}><em>Funding Opportunities:</em> We highly recommend exploring funding support. This project scope likely qualifies for the <strong>80% Charities Capability Fund (CCF) Consultancy Grant</strong>, administered by the National Council of Social Service (NCSS). We can assist in providing necessary technical schedules for the application.</p>
                                </div>

                                <div className="doc-section">
                                    <h3>8. Our Value Proposition and Team</h3>
                                    <p>By partnering with us, you gain access to an engagement team with robust Big 4 firm experience seamlessly merged with deep, sector-specific not-for-profit expertise. We understand the unique constraints and aspirations of Singaporean charities, allowing us to provide pragmatic, right-sized recommendations rather than one-size-fits-all corporate overlays.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProposalGenerator />);
    </script>
</body>
</html>
