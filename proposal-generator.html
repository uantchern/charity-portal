<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Proposal Generator | CharityOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
    
    <style>
        .workspace {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            font-family: var(--font-body);
        }

        .config-panel {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .config-panel::-webkit-scrollbar { width: 4px; }
        .config-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .preview-panel {
            padding: 3rem;
            overflow-y: auto;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        }

        /* Document Styling */
        .document-canvas {
            background: rgba(15, 19, 29, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4rem 4rem;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            animation: fadeUp 0.6s ease-out;
            position: relative;
        }

        .document-canvas::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 16px 16px 0 0;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        .doc-section {
            margin-bottom: 2.5rem;
            animation: fadeUp 0.5s ease-out both;
        }
        
        .doc-section:nth-child(2) { animation-delay: 0.1s; }
        .doc-section:nth-child(3) { animation-delay: 0.2s; }
        .doc-section:nth-child(4) { animation-delay: 0.3s; }

        .doc-section h2 {
            font-family: var(--font-mono);
            color: var(--accent-cyan);
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            padding-bottom: 0.5rem;
        }
        
        .doc-section p, .doc-section ul {
            color: #e2e8f0;
            line-height: 1.7;
            font-size: 1.05rem;
        }
        
        .doc-section ul {
            padding-left: 1.5rem;
            margin-top: 0.75rem;
        }
        
        .doc-section li {
            margin-bottom: 0.5rem;
        }

        /* Inputs */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            animation: fadeUp 0.4s ease-out;
        }
        
        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: var(--font-mono);
            font-weight: 600;
        }
        
        .input-field {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth, all 0.3s);
            width: 100%;
            box-sizing: border-box;
        }
        
        .input-field:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
            background: rgba(0,0,0,0.5);
        }
        
        textarea.input-field {
            resize: vertical;
            min-height: 80px;
        }

        .nblm-btn {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.15));
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: white;
            padding: 1.25rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .nblm-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        
        .nblm-btn:hover::before {
            left: 100%;
        }
        
        .nblm-btn:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(6, 182, 212, 0.3));
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.25);
            border-color: rgba(6, 182, 212, 0.6);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--accent-emerald, #10b981), #059669);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Custom SVG Icons ---
        const IconSvg = ({ children, size = 20, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );
        const ExternalLink = ({ size }) => <IconSvg size={size}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></IconSvg>;
        const Copy = ({ size }) => <IconSvg size={size}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></IconSvg>;
        const Check = ({ size }) => <IconSvg size={size}><polyline points="20 6 9 17 4 12"/></IconSvg>;
        const FileText = ({ size, color }) => <IconSvg size={size} color={color}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" /></IconSvg>;
        const ArrowLeft = ({ size }) => <IconSvg size={size}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconSvg>;

        const ProposalGenerator = () => {
            const [copied, setCopied] = useState(false);
            
            const [data, setData] = useState({
                charityName: "Hope Foundation",
                mission: "To empower vulnerable youth through education and mentorship programs.",
                requestedScope: "A comprehensive governance and internal controls review focusing on financial sustainability.",
                proposedScopeDetails: "Review of existing internal controls, sample testing of 30 recent financial transactions, and drafting of a new Finance SOP manual.",
                deliverables: "1. Internal Control Review Report\n2. Finance SOP Manual\n3. High-level Risk Register",
                timelineWeeks: "6",
                feeEstimate: "$15,000"
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setData(prev => ({ ...prev, [name]: value }));
            };

            const copyToClipboard = () => {
                const el = document.getElementById('proposal-document');
                if (!el) return;
                const content = el.innerText;
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(content).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }).catch(err => {
                        console.error('Copy failed', err);
                    });
                } else {
                    // Fallback for secure context issues over file://
                    const textarea = document.createElement('textarea');
                    textarea.value = content;
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (err) {
                        console.error('Fallback copy failed', err);
                    }
                    document.body.removeChild(textarea);
                }
            };

            return (
                <div className="workspace">
                    {/* Left Config Panel */}
                    <div className="config-panel">
                        <div style={{display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between'}}>
                            <div>
                                <h1 style={{ fontSize: '1.8rem', fontWeight: 800, background: 'linear-gradient(90deg, #38bdf8, #8b5cf6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '0.25rem', letterSpacing: '-0.03em' }}>
                                    Proposal Builder
                                </h1>
                                <p style={{ color: 'var(--text-muted, #94a3b8)', fontSize: '0.95rem', margin: 0 }}>Generate tailored SSC proposals</p>
                            </div>
                            <a href="index.html" style={{color: 'var(--text-muted, #94a3b8)', background: 'rgba(255,255,255,0.05)', padding: '0.5rem', borderRadius: '8px', transition: 'all 0.2s', textDecoration: 'none'}}>
                                <ArrowLeft size={20} />
                            </a>
                        </div>
                        
                        <a href="https://notebooklm.google.com/notebook/a64339a3-9e7e-4629-8351-07eeb18bb555" target="_blank" className="nblm-btn text-dock-btn">
                            <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'white', borderRadius: '4px', width: '28px', height: '28px' }}>
                                <img src="https://www.gstatic.com/images/branding/product/1x/notebooklm_48dp.png" alt="" style={{width: 18, height: 18}}/>
                            </span>
                            Consult SSC Proposals NBLM
                            <ExternalLink size={18} />
                        </a>

                        <div className="input-group">
                            <label>Charity Name</label>
                            <input type="text" name="charityName" className="input-field" value={data.charityName} onChange={handleChange} />
                        </div>

                        <div className="input-group">
                            <label>Charity Mission Summary</label>
                            <textarea name="mission" className="input-field" value={data.mission} onChange={handleChange} rows="2"></textarea>
                        </div>

                        <div className="input-group">
                            <label>Requested Scope</label>
                            <textarea name="requestedScope" className="input-field" value={data.requestedScope} onChange={handleChange} rows="2"></textarea>
                        </div>

                        <div className="input-group">
                            <label>Detailed Proposed Scope</label>
                            <textarea name="proposedScopeDetails" className="input-field" value={data.proposedScopeDetails} onChange={handleChange} style={{minHeight: '100px'}}></textarea>
                        </div>

                        <div className="input-group">
                            <label>Specific Deliverables</label>
                            <textarea name="deliverables" className="input-field" value={data.deliverables} onChange={handleChange} style={{minHeight: '80px'}}></textarea>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                            <div className="input-group">
                                <label>Timeline (Weeks)</label>
                                <input type="number" name="timelineWeeks" className="input-field" value={data.timelineWeeks} onChange={handleChange} />
                            </div>
                            <div className="input-group">
                                <label>Fee Estimate</label>
                                <input type="text" name="feeEstimate" className="input-field" value={data.feeEstimate} onChange={handleChange} />
                            </div>
                        </div>

                        <div style={{ marginTop: '1rem', paddingBottom: '2rem' }}>
                            <button className="action-btn" onClick={copyToClipboard} style={{ width: '100%' }}>
                                {copied ? <><Check size={20}/> Copied to Clipboard</> : <><Copy size={20}/> Copy Full Proposal</>}
                            </button>
                        </div>
                    </div>

                    {/* Right Preview Panel */}
                    <div className="preview-panel">
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', maxWidth: '900px', margin: '0 auto 2rem auto'}}>
                            <h2 style={{fontWeight: 600, color: 'white', display: 'flex', alignItems: 'center', gap: '0.75rem', margin: 0}}>
                                <FileText size={24} color="var(--accent-cyan, #06b6d4)" />
                                Live Document Preview
                            </h2>
                            <span className="context-badge" style={{borderColor: 'var(--accent-purple, #8b5cf6)', color: '#d8b4fe', padding: '0.4rem 0.8rem', borderRadius: '20px', fontSize: '0.8rem', border: '1px solid'}}>Auto-syncing active</span>
                        </div>

                        <div className="document-canvas" id="proposal-document">
                            <h1 style={{fontSize: '2.5rem', margin: '0 0 2.5rem 0', textAlign: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '1.5rem', fontWeight: 800}}>
                                Proposal for {data.charityName || '[Charity Name]'}
                            </h1>

                            <div className="doc-section">
                                <h2>1. Executive Summary</h2>
                                <p>Thank you for giving us the opportunity to present this proposal. We are a dedicated service provider with a strong vision and mission to elevate the social ecosystem. Our key differentiators include deep sector experience across charities and IPCs, affordable and transparent pricing, and a fundamental focus on capability-building rather than mere compliance ticking.</p>
                            </div>

                            <div className="doc-section">
                                <h2>2. Your Requirements & Our Response</h2>
                                <p>We understand that <strong>{data.charityName || '[Charity Name]'}</strong> is driven by the dynamic mission:<br/><br/><em>"{data.mission || '[Mission Statement]'}"</em></p>
                                <p style={{marginTop: '1rem'}}>To support this critical work, you have requested: {data.requestedScope || '[Requested Scope]'}. We are fully equipped and committed to addressing these specific requirements with precision and empathy.</p>
                            </div>

                            <div className="doc-section">
                                <h2>3. Proposed Scope</h2>
                                <p>Our detailed breakdown of the areas to be reviewed is as follows:</p>
                                <p style={{marginTop: '0.5rem', marginBottom: '0.5rem'}}>{data.proposedScopeDetails}</p>
                                <p><em>Sampling Methodology:</em> Unless otherwise specified, we will utilize targeted risk-based sampling combined with random sampling to ensure comprehensive coverage without overwhelming your operational team.</p>
                            </div>

                            <div className="doc-section">
                                <h2>4. Our Approach</h2>
                                <p>We utilize a collaborative, step-by-step methodology designed specifically for the charity sector and based on established governance frameworks. Our process includes:</p>
                                <ul>
                                    <li><strong>Opening Meeting:</strong> Aligning expectations, confirming timelines, and finalizing the document request list.</li>
                                    <li><strong>Fieldwork:</strong> Conducting targeted interviews with key stakeholders and performing necessary control testing.</li>
                                    <li><strong>Closing Meeting:</strong> Discussing draft observations collaboratively to ensure contextual accuracy.</li>
                                    <li><strong>Issuance of Final Report:</strong> Delivering actionable insights and finalized documentation.</li>
                                </ul>
                            </div>

                            <div className="doc-section">
                                <h2>5. Deliverables</h2>
                                <p>Upon completion of the engagement, we will provide the following clearly defined outputs:</p>
                                <ul>
                                    {data.deliverables ? data.deliverables.split('\n').filter(d => d.trim()).map((del, i) => (
                                        <li key={i}>{del}</li>
                                    )) : <li>[No deliverables specified]</li>}
                                </ul>
                            </div>

                            <div className="doc-section">
                                <h2>6. Review Schedule</h2>
                                <p>We estimate that this engagement will take approximately <strong>{data.timelineWeeks || '[X]'} weeks</strong>. This timeline intelligently allocates specific periods for planning, fieldwork, draft reporting, and finalization to minimize disruption to your operations.</p>
                            </div>

                            <div className="doc-section">
                                <h2>7. Fees and Funding Options</h2>
                                <p>Our professional fee for this engagement is estimated at <strong>{data.feeEstimate || '[Fee Amount]'}</strong>.</p>
                                <p style={{marginTop: '1rem'}}><em>Funding Opportunities:</em> We highly recommend exploring funding support. This project scope likely qualifies for the <strong>80% Charities Capability Fund (CCF) Consultancy Grant</strong>, administered by the National Council of Social Service (NCSS). We can assist in providing necessary technical schedules for the application.</p>
                            </div>

                            <div className="doc-section">
                                <h2>8. Our Value Proposition and Team</h2>
                                <p>By partnering with us, you gain access to an engagement team with robust Big 4 firm experience seamlessly merged with deep, sector-specific not-for-profit expertise. We understand the unique constraints and aspirations of Singaporean charities, allowing us to provide pragmatic, right-sized recommendations rather than one-size-fits-all corporate overlays.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProposalGenerator />);
    </script>
</body>
</html>
