    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-color: #1B2B28;
            --text-muted: #5E5A4B;
            --accent-color: #8B7355;
            --accent-hover: #1B2B28;
            --surface-color: #ffffff;
            --surface-hover: #fafafa;
            --border-color: #D2B48C;
            --error-color: #ef4444;
            --success-color: #10b981;
            --star-color: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 850px;
            min-height: 600px;
            margin: 0 auto;
            background-color: #E8E3D5;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(27, 43, 40, 0.1);
            overflow: hidden;
        }

        .setup-pane {
            background-color: transparent;
            padding: 40px;
            width: 380px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .chat-pane {
            background-color: var(--surface-color);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 850px) {
            .app-container {
                flex-direction: column;
                height: 100vh;
                max-height: none;
                margin: 0;
                padding: 0;
            }

            .setup-pane {
                width: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
                padding: 24px;
            }

            .chat-pane {
                display: none;
                border-radius: 0;
                box-shadow: none;
                border: none;
                border-top: 1px solid #EAE5D8;
            }

            .chat-pane.started {
                display: flex;
                height: 100%;
            }

            .setup-pane.started {
                display: none;
            }
        }

        .app-header {
            display: none;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            color: var(--accent-color);
            width: 28px;
            height: 28px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: var(--surface-color);
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 4rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Forms and Inputs */
        input[type="text"],
        textarea {
            width: 100%;
            background-color: var(--surface-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 1.125rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(210, 180, 140, 0.3);
        }

        .setup-fields {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .duration-input {
            height: 100%;
            min-height: 120px;
            text-align: center;
            font-size: 2rem !important;
            font-weight: 800;
            color: var(--accent-color) !important;
            background-color: var(--surface-color) !important;
            border: 2px solid var(--border-color) !important;
            border-radius: 12px;
        }

        .duration-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
        }

        @media (max-width: 640px) {
            .setup-fields {
                grid-template-columns: 1fr;
            }

            .duration-input {
                min-height: 60px;
            }
        }

        .audit-trail-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .audit-item {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 6px;
            align-items: center;
        }

        .audit-item:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .audit-index {
            color: var(--text-muted);
            width: 2rem;
        }

        .audit-star-tag {
            font-size: 0.6rem;
            font-weight: 900;
            background: var(--accent-color);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .metric-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
        }

        .metric-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .report-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 1rem;
        }

        .audit-btn {
            background: var(--accent-color);
            color: black !important;
            font-weight: 700;
            flex: 1.5;
        }

        /* Paradox Theme */
        .app-container.paradox-theme {
            --bg-color: #0d001a;
            --accent-color: #ff00ff;
            --accent-hover: #cc00cc;
            --border-color: #330066;
            --surface-color: #1a0033;
        }

        .paradox-label {
            font-size: 0.6rem;
            background: #ff00ff;
            color: black;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 900;
        }

        .paradox-toggle-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .paradox-overlay {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            pointer-events: none;
        }

        .paradox-glitch-text {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .audit-constraint {
            font-size: 0.7rem;
            font-style: italic;
            color: #ff00ff;
            margin-top: 2px;
            opacity: 0.8;
        }

        .paradox-summary-section h3 {
            color: #ff00ff !important;
            border-color: rgba(255, 0, 255, 0.3) !important;
        }

        .paradox-insight-card {
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1rem;
        }

        .paradox-insight-card p {
            font-size: 1.1rem;
            color: #ff00ff;
            margin-bottom: 1rem;
        }

        .interference-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 0, 255, 0.6);
        }

        button.primary-btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        button.primary-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4);
        }

        button.primary-btn:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Setup Phase */
        .setup-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding-top: 4rem;
        }

        .setup-header h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setup-header p {
            color: var(--text-muted);
            font-size: 1.125rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Storming Interface */
        .storming-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .storming-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .scenario-display {
            flex: 1;
            padding-right: 2rem;
        }

        .scenario-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .scenario-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 2rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--accent-color);
            background: var(--surface-color);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .timer-display.low-time {
            color: var(--error-color);
            border-color: var(--error-color);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 0 rgba(239, 68, 68, 0);
            }

            to {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            }
        }

        .input-section {
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            padding: 1rem 0 2rem;
            z-index: 10;
        }

        .question-form {
            position: relative;
            display: flex;
            gap: 1rem;
        }

        .question-input-wrapper {
            flex: 1;
            position: relative;
        }

        .submit-btn {
            background-color: var(--surface-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            width: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .validation-msg {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            color: var(--error-color);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .question-card {
            background-color: var(--surface-color);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            animation: slideIn 0.3s ease-out forwards;
        }

        .question-number {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 1.125rem;
            font-weight: 600;
            min-width: 2rem;
        }

        .question-content {
            font-size: 1.125rem;
            color: var(--text-color);
            word-break: break-word;
        }

        /* Review Phase */
        .review-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .review-header h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .review-header p {
            color: var(--text-muted);
            font-size: 1.125rem;
        }

        .review-stats {
            display: inline-flex;
            background: var(--surface-color);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 600;
            color: var(--accent-color);
            margin-top: 1rem;
            border: 1px solid var(--border-color);
        }

        .review-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .review-card {
            background-color: var(--surface-color);
            border: 2px solid var(--border-color);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .review-card:hover {
            border-color: var(--surface-hover);
            background-color: var(--surface-hover);
        }

        .review-card.starred {
            border-color: var(--star-color);
            background-color: rgba(251, 191, 36, 0.05);
        }

        .star-btn {
            background: none;
            border: none;
            color: var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .review-card:hover .star-btn {
            color: var(--text-muted);
        }

        .star-btn.active {
            color: var(--star-color);
            transform: scale(1.1);
        }

        .star-btn:hover {
            transform: scale(1.1);
        }

        .star-btn.active:hover {
            transform: scale(1.2);
        }

        .review-footer {
            margin-top: 3rem;
            text-align: center;
        }

        .download-btn {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .whatsapp-btn {
            background-color: #25D366;
            border: 1px solid #128C7E;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .whatsapp-btn:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div id="root"></div>

        const { useState, useEffect, useRef } = React;

        );
        const FileTextIcon = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
        );
        const ZapIcon = ({ size, className }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        );
        const MailIcon = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        );
        const MessageCircleIcon = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        );

        // --- Components ---
        const PRESET_CHALLENGES = [
            "How can we reach out to more donors?",
            "How can we attract more volunteers?",
            "What is the biggest inefficiency in our operations?",
            "How do we diversify our funding sources?",
            "How can we improve board engagement?",
            "How do we effectively measure and report our impact?",
            "How can we retain our staff and prevent burnout?",
            "How do we increase our digital presence and awareness?",
            "How can we build strategic partnerships with corporates?",
            "How do we ensure long-term financial sustainability?"
        ];

        function SessionSetup({ onStart, initialScenario, isStarted }) {
            const [scenario, setScenario] = useState(initialScenario || '');
            const [isParadox, setIsParadox] = useState(false);
            const [error, setError] = useState('');

            const validateQuestion = (text) => {
                const trimmed = text.trim();
                if (!trimmed) return false;

                if (trimmed.endsWith('?')) return true;

                const questionWords = ['who', 'what', 'where', 'when', 'why', 'how', 'if', 'could', 'would', 'should', 'is', 'are', 'do', 'does', 'can'];
                const lower = trimmed.toLowerCase();

                return questionWords.some(word => lower.startsWith(word) || lower.indexOf('\n' + word) !== -1 || lower.match(new RegExp('\\b' + word + '\\b')));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const trimmed = scenario.trim();
                if (trimmed) {
                    if (!validateQuestion(trimmed)) {
                        setError('Please framework your challenge as a question (must contain "?" or a question word)');
                        return; // block submission
                    }
                    setError('');
                    onStart(trimmed, isParadox);
                }
            };

            return (
                <div className="setup-container fade-in" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
                    <ul className="instructions-list" style={{ listStyle: 'none', padding: 0, margin: '0 0 30px 0' }}>
                        <li style={{ marginBottom: '24px', display: 'flex', alignItems: 'flex-start', gap: '16px', fontSize: '15px', color: '#5E5A4B', lineHeight: '1.5' }}>
                            <div style={{ color: '#D2B48C', marginTop: '2px', width: '24px', textAlign: 'center' }}>
                                <HelpCircleIcon size={22} />
                            </div>
                            <div><strong>Frame It</strong> as a clear question (Who, What, Why, How).</div>
                        </li>
                        <li style={{ marginBottom: '24px', display: 'flex', alignItems: 'flex-start', gap: '16px', fontSize: '15px', color: '#5E5A4B', lineHeight: '1.5' }}>
                            <div style={{ color: '#D2B48C', marginTop: '2px', width: '24px', textAlign: 'center' }}>
                                <BrainIcon size={22} />
                            </div>
                            <div><strong>Generate</strong> iterative, deeper alternative questions.</div>
                        </li>
                        <li style={{ marginBottom: '24px', display: 'flex', alignItems: 'flex-start', gap: '16px', fontSize: '15px', color: '#5E5A4B', lineHeight: '1.5' }}>
                            <div style={{ color: '#D2B48C', marginTop: '2px', width: '24px', textAlign: 'center' }}>
                                <ShareIcon size={22} />
                            </div>
                            <div><strong>Share</strong> the most useful question to WhatsApp.</div>
                        </li>
                    </ul>

                    {!isStarted && (
                        <form onSubmit={handleSubmit} className="input-group setup-form">
                            <div className="setup-fields" style={{ display: 'flex', flexDirection: 'column', gap: '16px', marginBottom: '16px' }}>
                                <div className="input-group">
                                    <label htmlFor="scenario" style={{ fontSize: '13px', fontWeight: 700, letterSpacing: '0.05em', color: '#8B7355', textTransform: 'uppercase' }}>Challenge Scenario</label>
                                    <textarea
                                        id="scenario"
                                        value={scenario}
                                        onChange={(e) => {
                                            setScenario(e.target.value);
                                            if (error) setError('');
                                        }}
                                        placeholder="e.g., Why is Key Word Sign not widely known?"
                                        rows={3}
                                        autoFocus
                                        required
                                        style={{ width: '100%', padding: '16px', borderRadius: '12px', border: '2px solid #D2B48C', fontSize: '15px', color: '#1B2B28', backgroundColor: 'white', resize: 'none' }}
                                    />
                                    {error && (
                                        <div className="validation-msg" style={{ marginTop: '0.5rem', display: 'flex', alignItems: 'center', gap: '0.5rem', color: '#ef4444', fontSize: '0.875rem' }}>
                                            <AlertCircleIcon size={14} />
                                            {error}
                                        </div>
                                    )}
                                </div>

                                <div className="input-group">
                                    <label style={{ fontSize: '12px', fontWeight: 600, color: '#5E5A4B', textTransform: 'uppercase', marginBottom: '4px' }}>
                                        Or select a common challenge:
                                    </label>
                                    <select
                                        value={PRESET_CHALLENGES.includes(scenario) ? scenario : ''}
                                        onChange={(e) => {
                                            if (e.target.value) {
                                                setScenario(e.target.value);
                                                setError('');
                                            }
                                        }}
                                        style={{
                                            width: '100%',
                                            padding: '12px 16px',
                                            borderRadius: '8px',
                                            border: '1px solid #D2B48C',
                                            backgroundColor: 'white',
                                            color: '#1B2B28',
                                            fontSize: '14px',
                                            cursor: 'pointer',
                                            outline: 'none'
                                        }}
                                    >
                                        <option value="" disabled>-- Choose a preset challenge --</option>
                                        {PRESET_CHALLENGES.map((challenge, idx) => (
                                            <option key={idx} value={challenge}>{challenge}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <button
                                type="submit"
                                className="primary-btn"
                                disabled={!scenario.trim()}
                                style={{ backgroundColor: '#1B2B28', color: 'white', border: 'none', padding: '16px', fontSize: '16px', fontWeight: 600, borderRadius: '12px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', width: '100%', boxShadow: '0 4px 12px rgba(27, 43, 40, 0.2)', transition: 'transform 0.2s ease, background-color 0.2s ease' }}
                            >
                                <PlayIcon size={20} />
                                Start Storming
                            </button>
                        </form>
                    )}
                </div>
            );
        }

        const PARADOX_CONSTRAINTS = [
            "Casualty Shift: How would this succeed if the effect happened before the cause?",
            "Structural Defiance: Describe this solution in a room with five 90-degree corners.",
            "Biological Anarchy: What if humans could breathe nitrogen instead of oxygen?",
            "Logical Singularity: Formulate a question that is simultaneously true and false.",
            "Static Momentum: Imagine a solution that moves at light speed while standing still.",
            "Sisyphus Oasis: Deliver water to a thirst that is exactly P=0. The cup is a lens, the map is a trap."
        ];

        function StormingInterface({ scenario, isParadoxMode, onTimeUp, initialQuestions, onUpdateQuestions }) {
            const [selectedId, setSelectedId] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
            const [constraintIndex, setConstraintIndex] = useState(0);
            const [warning, setWarning] = useState('');
            const endOfListRef = useRef(null);

            useEffect(() => {
                let constraintId;
                if (isParadoxMode) {
                    constraintId = setInterval(() => {
                        setConstraintIndex(prev => (prev + 1) % PARADOX_CONSTRAINTS.length);
                    }, 20000);
                }

                return () => {
                    if (constraintId) clearInterval(constraintId);
                };
            }, [isParadoxMode]);

            useEffect(() => {
                endOfListRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [initialQuestions.length]);

            const generateMoreQuestions = (selectedText) => {
                const templates = [
                    `What is the hidden opportunity inside: "${selectedText}"?`,
                    `How would a completely different industry address: "${scenario}"?`,
                    `If we had no money or resources, how would we tackle: "${selectedText}"?`,
                    `What is the most absurd, ridiculous way to answer: "${selectedText}"?`,
                    `What underlying assumption are we making when we ask: "${selectedText}"?`,
                    `How can we make exactly the opposite of "${scenario}" happen?`,
                    `Who is secretly benefiting from the fact that we haven't solved: "${scenario}"?`,
                    `If we had to solve "${scenario}" in 24 hours, what is our first step?`,
                    `What would happen if we ignored "${selectedText}" completely for a year?`,
                    `How would we explain "${scenario}" to a 5-year old?`,
                    `What is the 'elephant in the room' regarding "${scenario}" that nobody is talking about?`,
                    `If our success depended 100% on answering "${selectedText}", what changes?`,
                    `Who should we ask for help about "${scenario}" that we haven't considered yet?`,
                    `What is the hardest part about answering "${selectedText}"?`,
                    `How can we reframe "${scenario}" to be a benefit rather than a problem?`
                ];

                // Shuffle templates
                const shuffled = [...templates].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, 3).map((text, idx) => ({
                    id: Date.now().toString() + '-' + idx,
                    text,
                    starred: false,
                    paradoxConstraint: isParadoxMode ? PARADOX_CONSTRAINTS[constraintIndex] : null
                }));
            };

            const handleYes = () => {
                if (!selectedId) {
                    setWarning("Please select the most relevant question first!");
                    return;
                }
                setWarning('');
                const selectedText = initialQuestions.find(q => q.id === selectedId)?.text || scenario;
                const newQuestions = generateMoreQuestions(selectedText);
                onUpdateQuestions([...initialQuestions, ...newQuestions]);
                setSelectedId(null);
            };

            const handleNo = () => {
                if (!selectedId) {
                    setWarning("Please select your favorite question before finishing.");
                    return;
                }
                setWarning('');
                setIsFinished(true);
            };

            const handleWhatsApp = () => {
                if (!selectedId) {
                    alert("Please select the question you want to WhatsApp!");
                    return;
                }
                const winningQuestion = initialQuestions.find(q => q.id === selectedId);

                let text = `*Hi! I just used a Really Useful Thing from CharityOps.org to question storm a challenge.*\n\n`;
                text += `*Challenge:* ${scenario}\n`;
                if (isParadoxMode) text += `*Mode:* (Roll the dice for a 13)\n`;
                text += `\n*Winning Question:*\n${winningQuestion.text}\n`;
                text += `\n_Generated by Question Storming App_`;

                const encodedText = encodeURIComponent(text);
                window.open(`https://wa.me/?text=${encodedText}`, '_blank');
                onTimeUp(initialQuestions);
            };

            return (
                <div className={`storming-container fade-in ${isParadoxMode ? 'paradox-active' : ''}`}>
                    {isParadoxMode && (
                        <div className="paradox-overlay">
                            <div className="paradox-glitch-text">
                                <AlertCircleIcon size={14} />
                                <span>CONSTRAINT: {PARADOX_CONSTRAINTS[constraintIndex]}</span>
                            </div>
                        </div>
                    )}
                    <div className="storming-header">
                        <div className="scenario-display">
                            <div className="scenario-label">Challenge</div>
                            <div className="scenario-text">{scenario}</div>
                        </div>
                    </div>

                    <div className="questions-list">
                        {initialQuestions.slice(-3).map((q, i) => (
                            <div
                                key={q.id}
                                className={`question-card ${selectedId === q.id ? 'selected' : ''}`}
                                onClick={() => setSelectedId(q.id)}
                                style={{
                                    cursor: 'pointer',
                                    border: selectedId === q.id ? '2px solid #D2B48C' : '',
                                    backgroundColor: selectedId === q.id ? 'rgba(210, 180, 140, 0.1)' : '',
                                    transition: 'all 0.2s ease'
                                }}
                            >
                                <div className="question-number">{String(i + 1).padStart(2, '0')}</div>
                                <div className="question-content">{q.text}</div>
                            </div>
                        ))}
                    </div>

                    {!isFinished ? (
                        <div className="storm-again-prompt" style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem', marginTop: '1rem', width: '100%' }}>

                            {warning && (
                                <div style={{ padding: '0.75rem', backgroundColor: '#FEF2F2', border: '1px solid #F87171', color: '#DC2626', borderRadius: '8px', fontSize: '0.9rem', textAlign: 'center', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem', animation: 'fadeIn 0.3s' }}>
                                    <AlertCircleIcon size={16} /> {warning}
                                </div>
                            )}

                            <p style={{ color: 'var(--text-muted)', marginBottom: '0.5rem', fontSize: '0.9rem', textAlign: 'center' }}>
                                Select the most relevant question above, then choose to storm again or finish.
                            </p>
                            <button onClick={handleYes} style={{ width: '100%', padding: '12px 16px', borderRadius: '8px', border: '1px solid #D2B48C', backgroundColor: 'var(--surface-color)', color: 'var(--text-color)', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', transition: 'all 0.2s ease' }}>
                                <span style={{ fontSize: '1.2rem' }}>⚡</span> Storm Again
                            </button>
                            <button onClick={handleNo} style={{ width: '100%', padding: '12px 16px', borderRadius: '8px', border: 'none', backgroundColor: '#334155', color: 'white', fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                Finish Session
                            </button>
                        </div>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginTop: '24px', marginBottom: '16px', width: '100%' }}>
                            <p style={{ color: 'var(--text-muted)', marginBottom: '0px', fontSize: '15px', textAlign: 'center' }}>
                                Your session has concluded. Select the best question above.
                            </p>
                            <button onClick={handleWhatsApp} style={{ backgroundColor: '#25D366', color: 'white', fontWeight: 600, padding: '12px 16px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)', transition: 'background-color 0.2s', border: 'none', cursor: 'pointer', width: '100%' }}>
                                <MessageCircleIcon size={20} /> Share Details via WhatsApp
                            </button>
                            <button onClick={() => onTimeUp(initialQuestions)} style={{ backgroundColor: '#334155', color: 'white', fontWeight: 600, padding: '12px 16px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer', width: '100%' }}>
                                Back to Menu
                            </button>
                        </div>
                    )}

                    <div ref={endOfListRef} />
                </div>
            );
        }

        function ReviewMode({ scenario, questions, isParadoxMode, onGoToAnalysis }) {
            const [localQuestions, setLocalQuestions] = useState(questions);
            const starredCount = localQuestions.filter(q => q.starred).length;

            const toggleStar = (id) => {
                setLocalQuestions(prev => prev.map(q => {
                    if (q.id === id) {
                        if (!q.starred && starredCount >= 3) return q;
                        return { ...q, starred: !q.starred };
                    }
                    return q;
                }));
            };

            const handleDownload = () => {
                const starred = localQuestions.filter(q => q.starred);
                const others = localQuestions.filter(q => !q.starred);

                let content = `Challenge: ${scenario}\n\n`;
                content += `--- TOP 3 QUESTIONS ---\n`;
                starred.forEach((q, i) => content += `${i + 1}. ${q.text}\n`);

                content += `\n--- OTHER QUESTIONS ---\n`;
                others.forEach((q, i) => content += `${i + 1 + starred.length}. ${q.text}\n`);

                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `question-storm-${new Date().toISOString().slice(0, 10)}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleWhatsAppShare = () => {
                const starred = localQuestions.filter(q => q.starred);

                let text = `*Hi! I just used a Really Useful Thing from CharityOps.org to question storm a challenge.*\n\n`;
                text += `*Challenge:* ${scenario}\n\n`;
                if (isParadoxMode) text += `*Mode:* Paradox Singularity\n\n`;
                text += `*Top 3 Questions:*\n`;

                if (starred.length === 0) {
                    text += `(No questions were starred)\n`;
                } else {
                    starred.forEach((q, i) => text += `${i + 1}. ${q.text}\n`);
                }

                text += `\n_Generated by Question Storming App_`;

                const encodedText = encodeURIComponent(text);
                window.open(`https://wa.me/?text=${encodedText}`, '_blank');
            };

            const handleEmailShare = () => {
                const starred = localQuestions.filter(q => q.starred);
                const others = localQuestions.filter(q => !q.starred);

                let subject = `Question Storm: ${scenario}`;
                let body = `Hi! I just used a Really Useful Thing from CharityOps.org to question storm a challenge.\n\n`;
                body += `Challenge: ${scenario}\n`;
                if (isParadoxMode) body += `Mode: Paradox Singularity\n`;
                body += `\n--- TOP 3 QUESTIONS ---\n`;
                if (starred.length === 0) {
                    body += `(No questions were starred)\n`;
                } else {
                    starred.forEach((q, i) => body += `${i + 1}. ${q.text}\n`);
                }

                body += `\n--- OTHER QUESTIONS ---\n`;
                others.forEach((q, i) => body += `${i + 1 + starred.length}. ${q.text}\n`);

                body += `\n_Generated by Question Storming App_`;

                const mailtoUrl = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoUrl;
            };

            if (questions.length === 0) {
                return (
                    <div className="review-header fade-in">
                        <h2>Time's Up!</h2>
                        <p>You didn't generate any questions this round.</p>
                    </div>
                );
            }

            return (
                <div className="fade-in">
                    <div className="review-header">
                        <h2>Time's Up!</h2>
                        <p>Review your brainstormed list and star your <strong>Top 3</strong> questions.</p>
                        <div className="review-stats">
                            {starredCount} / 3 Starred
                        </div>
                    </div>

                    <div className="review-list">
                        {localQuestions.map((q) => (
                            <div
                                key={q.id}
                                className={`review-card ${q.starred ? 'starred' : ''}`}
                                onClick={() => toggleStar(q.id)}
                            >
                                <div className="question-content">{q.text}</div>
                                <button
                                    className={`star-btn ${q.starred ? 'active' : ''}`}
                                    title={q.starred ? "Unstar" : "Star"}
                                >
                                    <StarIcon fill={q.starred ? "currentColor" : "none"} size={24} />
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="review-footer">
                        <div style={{ display: 'flex', gap: '0.75rem', width: '100%', flexWrap: 'wrap' }}>
                            <button onClick={handleWhatsAppShare} className="whatsapp-btn" style={{ flex: 1, minWidth: '120px' }}>
                                WhatsApp
                            </button>
                            <button onClick={handleEmailShare} className="download-btn" style={{ flex: 1, minWidth: '120px', marginBottom: '1rem' }}>
                                <MailIcon size={16} /> Email
                            </button>
                            <button onClick={handleDownload} className="download-btn" style={{ flex: 1, minWidth: '120px', marginBottom: '1rem' }}>
                                Export
                            </button>
                            <button
                                onClick={() => onGoToAnalysis(localQuestions)}
                                className="primary-btn audit-btn"
                                style={{ flex: 1.5, minWidth: '200px' }}
                            >
                                <ClipboardCheckIcon size={18} />
                                Audit Report
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function SessionAnalysis({ session, onBack }) {
            const starredQuestions = questions.filter(q => q.starred);
            const totalQuestions = questions.length;

            const handleEmailReport = () => {
                let subject = `Question Storming Audit: ${scenario}`;
                let report = `QUESTION STORMING AUDIT REPORT\n==========================\nChallenge: ${scenario}\nMode: ${isParadoxMode ? 'PARADOX' : 'Standard'}\nTotal Questions: ${totalQuestions}\nStorm Density: ${qpm} q/min\n\nTOP OUTCOMES:\n`;
                starredQuestions.forEach((q, i) => report += `${i + 1}. ${q.text}\n`);
                report += `\nFULL AUDIT TRAIL:\n`;
                questions.forEach((q, i) => report += `[${i + 1}] ${q.text}${q.paradoxConstraint ? ` (Interference: ${q.paradoxConstraint})` : ''}${q.starred ? ' (STARRED)' : ''}\n`);

                const mailtoUrl = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(report)}`;
                window.location.href = mailtoUrl;
            };

            const handleDownloadReport = () => {
                let report = `QUESTION STORMING AUDIT REPORT\n==========================\nChallenge: ${scenario}\nMode: ${isParadoxMode ? 'PARADOX' : 'Standard'}\nTotal Questions: ${totalQuestions}\n\nTOP OUTCOMES:\n`;
                starredQuestions.forEach((q, i) => report += `${i + 1}. ${q.text}\n`);
                report += `\nFULL AUDIT TRAIL:\n`;
                questions.forEach((q, i) => report += `[${i + 1}] ${q.text}${q.paradoxConstraint ? ` (Interference: ${q.paradoxConstraint})` : ''}${q.starred ? ' (STARRED)' : ''}\n`);

                const blob = new Blob([report], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.body.appendChild(document.createElement('a'));
                link.href = url;
                link.download = `audit_report_${Date.now()}.txt`;
                link.click();
                link.remove();
            };

            return (
                <div className="analysis-container fade-in">
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', alignItems: 'center', gap: '0.5rem' }}>
                        <button onClick={onBack} className="back-btn" style={{ whiteSpace: 'nowrap' }}><ArrowLeftIcon size={16} /> Back</button>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button onClick={handleEmailReport} className="primary-btn" style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}><MailIcon size={16} /> Email Report</button>
                            <button onClick={handleDownloadReport} className="primary-btn" style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}><FileTextIcon size={16} /> Export Audit</button>
                        </div>
                    </div>
                    <div className="report-card">
                        <h2 style={{ fontSize: '1.5rem', marginBottom: '0.5rem' }}>{scenario}</h2>
                        <div className="metrics-grid">
                            <div className="metric-box"><span className="metric-value">{totalQuestions}</span><span className="metric-label">Questions</span></div>
                            <div className="metric-box"><span className="metric-value">{starredQuestions.length}</span><span className="metric-label">Starred</span></div>
                        </div>

                        {isParadoxMode && (
                            <div className="report-section paradox-summary-section">
                                <h3 style={{ color: '#ff00ff' }}>Paradox Summary</h3>
                                <div className="paradox-insight-card">
                                    <p>Reality fractured {questions.filter(q => q.paradoxConstraint).length} times.</p>
                                    <div className="interference-stats">
                                        <span>Intensity: High</span>
                                        <span>Stability: Unstable</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        <h3 style={{ borderBottom: '1px solid #333', paddingBottom: '0.5rem', margin: '1rem 0' }}>Audit Trail</h3>
                        <div className="audit-trail-list">
                            {questions.map((q, i) => (
                                <div key={q.id} className="audit-item" style={{ flexDirection: 'column', alignItems: 'flex-start' }}>
                                    <div style={{ display: 'flex', gap: '1rem', width: '100%' }}>
                                        <span className="audit-index">{String(i + 1).padStart(2, '0')}</span>
                                        <span style={{ flex: 1 }}>{q.text}</span>
                                        {q.starred && <span className="audit-star-tag">STARRED</span>}
                                    </div>
                                    {q.paradoxConstraint && (
                                        <div className="audit-constraint" style={{ marginLeft: '3rem' }}>
                                            Anomaly: {q.paradoxConstraint}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const APP_STATE_KEY = 'questionStormingState';

        function App() {
            const [session, setSession] = useState(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlPrompt = urlParams.get('prompt');

                const saved = localStorage.getItem(APP_STATE_KEY);
                if (saved && !urlPrompt) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) { }
                }

                return {
                    phase: 'SETUP',
                    scenario: urlPrompt || '',
                    questions: [],
                    isParadoxMode: false
                };
            });
            useEffect(() => {
                localStorage.setItem(APP_STATE_KEY, JSON.stringify(session));
            }, [session]);

            const handleStartStorm = (scenario, isParadoxMode) => {
                const initialQuestions = [
                    { id: Date.now().toString() + '-1', text: "Why is this challenge the most critical one to solve right now?", starred: false, paradoxConstraint: null },
                    { id: Date.now().toString() + '-2', text: "Who currently benefits from the situation remaining exactly as it is?", starred: false, paradoxConstraint: null },
                    { id: Date.now().toString() + '-3', text: "If we could completely reverse the assumptions about this challenge, what would the solution look like?", starred: false, paradoxConstraint: null }
                ];
                setSession({ phase: 'STORMING', scenario, questions: initialQuestions, isParadoxMode });
            };
            const handleTimerEnd = (questions) => setSession({ phase: 'SETUP', scenario: '', questions: [], isParadoxMode: false });
            const handleReset = () => {
                if (confirm("Are you sure you want to reset the session? All your questions will be lost.")) {
                    setSession({ phase: 'SETUP', scenario: '', questions: [], isParadoxMode: false });
                }
            };
            const handleGoToAnalysis = (questions) => setSession((prev) => ({ ...prev, phase: 'ANALYSIS', questions }));

            return (
                <div className={`app-container ${session.isParadoxMode ? 'paradox-theme' : ''}`}>
                    <div className={`setup-pane ${session.phase !== 'SETUP' ? 'started' : ''}`} id="debugDrawer">
                        <div className="font-serif text-3xl leading-none cursor-default select-none group" style={{ fontFamily: 'Georgia, serif', marginBottom: '1.5rem' }}>
                            <span className="relative inline-block" style={{ position: 'relative', display: 'inline-block' }}>
                                <span className="italic relative z-10" style={{ color: '#103020', fontWeight: 500, paddingRight: '0.25rem', position: 'relative', zIndex: 10, fontStyle: 'italic' }}>Charity</span>
                                <span style={{ position: 'absolute', left: '-0.2em', right: 0, bottom: '12%', height: '2px', background: '#B08968', zIndex: 0, transformOrigin: 'left', transition: 'transform 0.7s ease-out' }}></span>
                            </span><span className="relative z-10 tracking-tight" style={{ color: '#B08968', position: 'relative', zIndex: 10, fontWeight: 400, letterSpacing: '-0.025em', marginLeft: '-0.05em' }}>Ops</span>
                        </div>

                        <h1 style={{ fontSize: '28px', color: '#1B2B28', fontWeight: 800, marginBottom: '8px', fontFamily: 'Georgia, serif' }}>
                            Question Storming {session.isParadoxMode && <span className="paradox-label" style={{ fontSize: '12px' }}>ROLL THE DICE FOR A 13</span>}
                        </h1>
                        <p className="tagline" style={{ color: '#8B7355', fontSize: '13px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '30px' }}>
                            <span style={{ marginRight: '0.5rem' }}>✦</span> A Really Useful Thing
                        </p>

                        <SessionSetup onStart={handleStartStorm} initialScenario={session.scenario} isStarted={session.phase !== 'SETUP'} />
                    </div>

                    <div className={`chat-pane ${session.phase !== 'SETUP' ? 'started' : ''}`} id="chatContainer">
                        <div className="chat-header" style={{ backgroundColor: '#1B2B28', padding: '20px 24px', display: 'flex', alignItems: 'center', color: 'white', gap: '12px' }}>
                            <button onClick={handleReset} className="mobile-back-btn" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'white' }}>
                                <span style={{ fontSize: '1.25rem' }}>←</span>
                            </button>
                            <div style={{ width: '32px', height: '32px', borderRadius: '9999px', background: '#8B7355', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '14px', fontWeight: 'bold', border: '1px solid #D2B48C', overflow: 'hidden' }}>
                                <span style={{ color: 'white' }}>QS</span>
                            </div>
                            <h2 style={{ fontSize: '18px', fontWeight: 600, margin: 0, flexGrow: 1, fontFamily: 'Georgia, serif' }}>Session Viewer</h2>
                        </div>

                        <div className="chat-window" style={{ backgroundColor: '#F9F8F6', flex: 1, overflowY: 'auto', padding: '24px', display: 'flex', flexDirection: 'column', gap: '16px' }}>
                            {session.phase === 'SETUP' ? (
                                <div className="empty-state" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', opacity: 0.6, textAlign: 'center', color: '#5E5A4B' }}>
                                    <div style={{ fontSize: '3.75rem', marginBottom: '1rem', color: '#D2B48C' }}>📋</div>
                                    <p style={{ fontSize: '1.125rem', fontWeight: 600 }}>Ready to storm.</p>
                                    <p style={{ fontSize: '0.875rem', marginTop: '0.5rem' }}>Enter a challenge and click "Start Storming" to begin.</p>
                                </div>
                            ) : (
                                <StormingInterface
                                    scenario={session.scenario}
                                    isParadoxMode={session.isParadoxMode}
                                    initialQuestions={session.questions}
                                    onTimeUp={handleTimerEnd}
                                    onUpdateQuestions={(qs) => setSession(prev => ({ ...prev, questions: qs }))}
                                />
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
