<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Audit Super App | CharityOps</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 40px;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            max-height: 900px;
            min-height: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Left Side (Logic Engine) */
        .setup-pane {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            width: 480px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(210, 180, 140, 0.3);
            flex-shrink: 0;
            overflow-y: auto;
        }

        .setup-pane::-webkit-scrollbar { width: 6px; }
        .setup-pane::-webkit-scrollbar-thumb { background: rgba(210, 180, 140, 0.5); border-radius: 10px; }

        .setup-pane h1 {
            font-size: 28px;
            color: #1B2B28;
            font-weight: 900;
            margin-bottom: 8px;
            font-family: Georgia, serif;
            line-height: 1.2;
        }

        .tagline {
            color: #8B7355;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #8B7355;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .input-field, .preset-select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #D2B48C;
            font-size: 14px;
            color: #1B2B28;
            background-color: white;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .preset-select {
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238B7355' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        .input-field:focus, .preset-select:focus {
            border-color: #8B7355;
            box-shadow: 0 0 0 4px rgba(210, 180, 140, 0.3);
        }

        .primary-btn {
            background-color: #1B2B28;
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(27, 43, 40, 0.2);
            margin-top: auto;
        }

        .primary-btn:hover:not(:disabled) {
            background-color: #8B7355;
            transform: translateY(-2px);
        }

        .primary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Question Stormer Phase Styling */
        .q-card {
            background: white;
            border: 1px solid #EAE5D8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
            color: #1B2B28;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .q-number {
            font-family: Georgia, serif;
            font-size: 18px;
            color: #8B7355;
            font-weight: bold;
            line-height: 1;
        }

        .wayfinding-box {
            background: #FDFBF7;
            border-left: 4px solid #D2B48C;
            padding: 16px;
            margin-top: 24px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #5E5A4B;
        }

        /* Right Side (Output Module) */
        .preview-pane {
            background-color: rgba(255, 255, 255, 0.5);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .preview-header {
            background-color: #1B2B28;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            color: white;
            gap: 12px;
        }

        .preview-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            flex-grow: 1;
            font-family: Georgia, serif;
        }

        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background-image:
                radial-gradient(circle at 100% 0%, rgba(210, 180, 140, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(139, 115, 85, 0.05) 0%, transparent 40%);
        }

        .document-canvas {
            background: #ffffff;
            border: 1px solid #EAE5D8;
            border-radius: 8px;
            padding: 60px 70px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            min-height: 100%;
        }

        .document-title {
            font-family: Georgia, serif;
            font-size: 28px;
            color: #1B2B28;
            text-align: center;
            border-bottom: 2px solid #D2B48C;
            padding-bottom: 24px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .doc-section {
            margin-bottom: 32px;
        }

        .doc-section h3 {
            font-family: -apple-system, sans-serif;
            color: #8B7355;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            border-bottom: 1px solid #EAE5D8;
            padding-bottom: 6px;
        }

        .doc-section p, .doc-section ul {
            color: #5E5A4B;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .doc-section ul {
            padding-left: 24px;
            margin-top: 8px;
        }
        
        .doc-section li { margin-bottom: 6px; }

        .progress-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #D2B48C;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .progress-step.active { color: #1B2B28; }
        .progress-step.completed { color: #8B7355; }
        .progress-line { height: 2px; width: 24px; background: #EAE5D8; }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8B7355;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        
        const IconSvg = ({ children, size = 20, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );
        const Bolt = ({size}) => <IconSvg size={size}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconSvg>;
        const Check = ({size}) => <IconSvg size={size}><polyline points="20 6 9 17 4 12"/></IconSvg>;
        const ArrowRight = ({size}) => <IconSvg size={size}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconSvg>;
        const Compass = ({size}) => <IconSvg size={size}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></IconSvg>;

        // Generic Core Logic Engine Mocks
        const QUESTION_BANK = {
            "Board Governance": [
                "Are board meeting minutes sanitized to the point where dissenting voices and robust debate disappear?",
                "Is the succession plan reliant strictly on who is friends with the current Chairman?",
                "Are 'independent' directors truly challenging management, or just rubber-stamping the CEO's operational updates?"
            ],
            "Strategic Direction and Programme Management": [
                "Are you tracking outcomes that genuinely measure impact, or just counting activities for the annual report?",
                "If your largest programme's funding was cut by 50% tomorrow, how quickly would operations adapt?",
                "How frequently does the Board review programme relevance against the evolving needs of your beneficiaries?"
            ],
            "Human Resource and Volunteer Management": [
                "Is there a clear, documented process for handling serious grievances, and has it ever been tested?",
                "Do volunteers have access to sensitive beneficiary data without proper offboarding protocols?",
                "Are critical operations highly dependent on a single staff member without any cross-training or handover manual?"
            ],
            "Financial Management and Internal Controls": [
                "Are expense approvals occasionally bypassed or split to avoid triggering higher authorisation thresholds?",
                "Can the person who processes payments also independently approve them in your banking portal?",
                "How frequently are your restricted funds reconciled to ensure they haven't bled into unrestricted operations?"
            ],
            "Fundraising Practices": [
                "Are specific donor intent conditions truly firewalled in your accounting, or does cash mingle in operations?",
                "If a major gala fails to break even, at what specific milestone is the trigger pulled to cut losses?",
                "How are external commercial fundraisers engaged, and are their success fees skewing your stated cost-of-fundraising ratios?"
            ],
            "Disclosure and Transparency": [
                "Would a member of the public easily understand how much goes to overhead versus actual programmes from your annual report?",
                "Are related party transactions fully disclosed and rigorously justified, or treated as standard operational expenses?",
                "If a serious governance lapse occurred, is there a clear protocol on what and when to disclose to your stakeholders?"
            ]
        };

        const SuperApp = () => {
            const [phase, setPhase] = useState(1); // 1 = Intake, 2 = Storming, 3 = Drafting
            const [data, setData] = useState({
                charityName: "",
                ipcStatus: "Non-IPC",
                auditDomain: ""
            });
            const [questions, setQuestions] = useState([]);
            const [newQuestion, setNewQuestion] = useState("");

            const handleChange = (e) => {
                setData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            };

            const startStorming = () => {
                if(data.charityName && data.auditDomain) {
                    const generics = QUESTION_BANK[data.auditDomain] || QUESTION_BANK["Board Governance"];
                    setQuestions(generics.slice(0, 3));
                    setPhase(2);
                }
            };

            const addQuestion = () => {
                if(newQuestion.trim()) {
                    setQuestions([...questions, newQuestion.trim()]);
                    setNewQuestion("");
                }
            };

            const startDrafting = () => {
                setPhase(3);
            };

            const shareViaWhatsApp = () => {
                let text = `*Internal Audit Scope - ${data.auditDomain || 'Custom'}*\n*Charity:* ${data.charityName || 'Not specified'}\n\n*Agreed Questions:*\n`;
                questions.forEach((q, i) => {
                    if (q.trim()) text += `${i+1}. ${q.trim()}\n\n`;
                });
                text += `_CONFIDENTIAL // SSC Internal Auditor_`;
                
                const encodedText = encodeURIComponent(text);
                window.open(`https://api.whatsapp.com/send?text=${encodedText}`, '_blank');
            };

            return (
                <div className="app-container">
                    <div className="setup-pane">
                        {/* CharityOps logo removed */ }
                        
                        <div style={{ marginBottom: '24px' }}>
                            <p className="tagline"><Bolt size={14}/> SSC</p>
                            <h1>Internal Auditor</h1>
                        </div>

                        {/* Progress Stepper */}
                        <div className="progress-indicator">
                            <div className={`progress-step ${phase >= 1 ? 'completed' : ''}`}>1. Intake</div>
                            <div className="progress-line"></div>
                            <div className={`progress-step ${phase >= 2 ? (phase === 3 ? 'completed' : 'active') : ''}`}>2. Storming</div>
                            <div className="progress-line"></div>
                            <div className={`progress-step ${phase === 3 ? 'active' : ''}`}>3. Instructions</div>
                        </div>

                        {/* PHASE 1: INTAKE */}
                        {phase === 1 && (
                            <div style={{animation: 'fadeIn 0.3s'}}>
                                <div className="input-group" style={{marginTop: '16px'}}>
                                    <label>1. Charity Name</label>
                                    <input type="text" name="charityName" className="input-field" placeholder="e.g. Hope Foundation" value={data.charityName} onChange={handleChange} />
                                </div>

                                <div className="input-group">
                                    <label>2. IPC Status</label>
                                    <select name="ipcStatus" className="preset-select" value={data.ipcStatus} onChange={handleChange}>
                                        <option value="Non-IPC">Non-IPC (Standard Compliance)</option>
                                        <option value="IPC">IPC (Enhanced Governance Requirements)</option>
                                    </select>
                                </div>

                                <div className="input-group">
                                    <label>3. Audit Areas</label>
                                    <select name="auditDomain" className="preset-select" value={data.auditDomain} onChange={handleChange}>
                                        <option value="">- Select Specific Area -</option>
                                        <option value="Board Governance">Board Governance</option>
                                        <option value="Strategic Direction and Programme Management">Strategic Direction and Programme Management</option>
                                        <option value="Human Resource and Volunteer Management">Human Resource and Volunteer Management</option>
                                        <option value="Financial Management and Internal Controls">Financial Management and Internal Controls</option>
                                        <option value="Fundraising Practices">Fundraising Practices</option>
                                        <option value="Disclosure and Transparency">Disclosure and Transparency</option>
                                    </select>
                                </div>

                                <button 
                                    className="primary-btn" 
                                    onClick={startStorming}
                                    disabled={!data.charityName || !data.auditDomain}
                                    style={{marginTop: '24px'}}
                                >
                                    Proceed to Question Storming <ArrowRight size={18}/>
                                </button>
                            </div>
                        )}

                        {/* PHASE 2 & 3: QUESTION STORMING & WAYFINDING */}
                        {phase === 2 && (
                            <div style={{animation: 'fadeIn 0.3s', display: 'flex', flexDirection: 'column', height: '100%'}}>
                                <p style={{ fontSize: '14px', color: '#5E5A4B', lineHeight: 1.6, margin: '0 0 16px 0', fontWeight: 600 }}>
                                    Here are the 3 core areas of concern surrounding {data.auditDomain}:
                                </p>

                                <div style={{flex: 1, overflowY: 'auto', paddingRight: '4px'}}>
                                    {questions.map((q, idx) => (
                                        <div key={idx} className="q-card">
                                            <div className="q-number">Q{idx+1}</div>
                                            <div>{q}</div>
                                        </div>
                                    ))}

                                    <div style={{marginTop: '16px', borderTop: '1px solid #EAE5D8', paddingTop: '16px', paddingBottom: '16px'}}>
                                        <div style={{fontWeight: 700, color: '#8B7355', marginBottom: '8px', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '0.05em'}}>Storm Additional Question</div>
                                        <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
                                            <textarea 
                                                className="input-field" 
                                                style={{minHeight: '60px', width: '100%', resize: 'vertical'}} 
                                                placeholder="Type an additional question or custom scope here..." 
                                                value={newQuestion}
                                                onChange={e => setNewQuestion(e.target.value)}
                                            ></textarea>
                                            <button className="primary-btn" style={{padding: '12px', marginTop: '0', backgroundColor: '#EAE5D8', color: '#1B2B28'}} onClick={addQuestion}>
                                                <i className="fas fa-bolt"></i> Storm & Add
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div style={{display: 'flex', gap: '12px', marginTop: '24px'}}>
                                    <button className="primary-btn" style={{backgroundColor: '#EAE5D8', color: '#1B2B28', flex: 0.5}} onClick={() => setPhase(1)}>
                                        Back
                                    </button>
                                    <button className="primary-btn" style={{flex: 1}} onClick={startDrafting}>
                                        Generate Instructions <ArrowRight size={18}/>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* PHASE 4 BUTTONS */}
                        {phase === 3 && (
                            <div style={{animation: 'fadeIn 0.3s'}}>
                                <div style={{padding: '24px', backgroundColor: 'white', borderRadius: '12px', border: '1px solid #EAE5D8', marginBottom: '24px'}}>
                                    <div style={{fontWeight: 700, color: '#8B7355', marginBottom: '16px', fontSize: '13px', textTransform: 'uppercase', letterSpacing: '0.05em'}}>Assess Current State</div>
                                    <input type="range" min="1" max="10" defaultValue="5" style={{width: '100%', marginBottom: '12px', accentColor: '#D2B48C'}} />
                                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#5E5A4B', fontWeight: 600}}>
                                        <span>1: Firefighting</span>
                                        <span>10: Well Managed</span>
                                    </div>
                                </div>

                                <button className="primary-btn" style={{backgroundColor: '#25D366', color: 'white'}} onClick={shareViaWhatsApp}>
                                    <i className="fab fa-whatsapp text-xl"></i> Share via WhatsApp
                                </button>
                                <button className="primary-btn" style={{backgroundColor: 'transparent', color: '#8B7355', border: '1px solid #D2B48C', marginTop: '12px'}} onClick={() => setPhase(1)}>
                                    <i className="fas fa-home"></i> Home
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Right Pane Preview */}
                    <div className="preview-pane">
                        <div className="preview-header">
                            {/* Content removed per design */}
                        </div>
                        
                        <div className="preview-content">
                            {phase === 1 ? (
                                <div className="empty-state" style={{flexDirection: 'column', alignItems: 'stretch', padding: '0 40px', justifyContent: 'center'}}>
                                    <div style={{background: 'white', padding: '40px', borderRadius: '16px', boxShadow: '0 10px 30px rgba(0,0,0,0.05)', textAlign: 'left', border: '1px solid #EAE5D8'}}>
                                        <h2 style={{fontSize: '24px', fontFamily: 'Georgia, serif', color: '#1B2B28', marginBottom: '20px', borderBottom: '2px solid #D2B48C', paddingBottom: '16px'}}>What is Question Storming?</h2>
                                        <p style={{fontSize: '15px', color: '#5E5A4B', lineHeight: 1.6, marginBottom: '16px'}}>
                                            <strong style={{color: '#8B7355'}}>Question Storming</strong> is a framework where we systematically brainstorm tough, high-impact questions instead of rushing straight into 'fixing' things.
                                        </p>
                                        <p style={{fontSize: '15px', color: '#5E5A4B', lineHeight: 1.6}}>
                                            By focusing on getting the questions right first, we surface hidden risks and bypass cognitive blind spots. This ensures we stop just firefighting the "loudest" problems or doing paper-chasing for compliance, and actually tackle the real, systemic issues on the ground.
                                        </p>
                                    </div>
                                </div>
                            ) : (
                                <div className="document-canvas">
                                    <h1 className="document-title" style={{borderBottom: 'none', paddingBottom: '0', marginBottom: '16px'}}>
                                        Instructions
                                    </h1>
                                    <h2 style={{fontSize: '20px', color: '#8B7355', textAlign: 'center', marginBottom: '40px', fontFamily: 'Georgia, serif'}}>
                                        {data.auditDomain} Review
                                    </h2>

                                    <div className="doc-section">
                                        <ul style={{marginTop: '32px', paddingLeft: 0, listStyle: 'none'}}>
                                            {questions.map((q, i) => (
                                                <li key={i} style={{marginBottom: '16px', padding: '20px', backgroundColor: '#FDFBF7', borderRadius: '8px', borderLeft: '4px solid #D2B48C', fontSize: '15px', color: '#1B2B28'}}>
                                                    <strong style={{color: '#8B7355', display: 'block', marginBottom: '8px', fontFamily: 'Georgia, serif'}}>Question {i+1}</strong>
                                                    <div 
                                                        contentEditable={phase < 3}
                                                        suppressContentEditableWarning={true}
                                                        onBlur={(e) => {
                                                            const newQ = [...questions];
                                                            newQ[i] = e.currentTarget.textContent;
                                                            setQuestions(newQ);
                                                        }}
                                                        style={{width: '100%', minHeight: '30px', border: phase < 3 ? '1px dashed transparent' : 'none', padding: '4px', outline: 'none', lineHeight: '1.6'}}
                                                        onFocus={(e) => { if (phase < 3) e.target.style.border = '1px dashed #D2B48C'; }}
                                                        onMouseLeave={(e) => { if (phase < 3 && document.activeElement !== e.target) e.target.style.border = '1px dashed transparent'; }}
                                                    >
                                                        {q}
                                                    </div>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SuperApp />);
    </script>
</body>
</html>
